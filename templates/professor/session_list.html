{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Sessions for {{ course.name }}</h2>
    <a href="{% url 'create_session' course.id %}" class="btn btn-success"><i class="fas fa-plus"></i> New Session</a>
</div>

<div class="table-responsive">
    <table class="table table-hover">
        <thead>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for session in sessions %}
            <tr>
                <td>{{ session.session_date }}</td>
                <td>{{ session.start_time }} - {{ session.end_time }}</td>
                <td>
                    <a href="{% url 'capture_attendance' session.id %}" class="btn btn-primary btn-sm">
                        <i class="fas fa-camera"></i> Start Capture
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
