{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-card">
            <h3 class="mb-4"><i class="fa-solid fa-user-plus me-2"></i>Ajouter un Nouvel Étudiant</h3>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Nom Complet</label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Code Masar</label>
                        <input type="text" name="code_masar" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Filière</label>
                    <input type="text" name="filiere" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Mot de passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="text-warning">Photo de l'Étudiant (Requise pour Face ID)</label>
                    <input type="file" name="photo" class="form-control" accept="image/*" required>
                    <small class="text-muted">Veuillez télécharger une photo claire et de face.</small>
                </div>

                <button type="submit" class="btn btn-premium w-100 mb-2">Ajouter l'Étudiant</button>
                <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-light w-100">Retour</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
