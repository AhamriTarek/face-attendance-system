{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card">
            <h3 class="mb-4"><i class="fa-solid fa-chalkboard-teacher me-2"></i>Créer un Professeur</h3>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Nom Complet</label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Email (Identifiant)</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label>Mot de passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-premium w-100 mb-2">Créer le Compte</button>
                <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-light w-100">Retour</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
